services:
  # REVERSE PROXY: El único punto de entrada desde internet
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: app_gateway
    restart: always
    ports:
      - '80:80' # HTTP público
      - '81:81' # Panel de administración (Admin UI)
      - '443:443' # HTTPS público (SSL)
    volumes:
      - ./infra/proxy_data:/data
      - ./infra/letsencrypt:/etc/letsencrypt
    networks:
      - private_network

  # BASE DE DATOS: MongoDB (Sin acceso externo)
  db:
    image: mongo:latest
    container_name: app_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ./storage/mongodb_data:/data/db
    networks:
      - private_network

  # BACKEND: FastAPI
  api:
    build: ./app/api
    container_name: app_api
    restart: always
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/
      STORAGE_PATH: /app/data/documents
    volumes:
      - ./storage/documents:/app/data/documents
    depends_on:
      - db
    networks:
      - private_network

  # FRONTEND: Vue.js
  web:
    build: ./app/web
    container_name: app_vue_frontend
    restart: always
    depends_on:
      - api
    networks:
      - private_network

  # INTERFAZ DB: Mongo Express (Acceso vía Proxy)
  mongo-ui:
    image: mongo-express
    container_name: app_mongo_visual
    restart: always
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_WEB_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_WEB_PASSWORD}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/
    depends_on:
      - db
    networks:
      - private_network

networks:
  private_network:
    driver: bridge
